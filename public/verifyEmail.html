<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" type="image/x-icon" href="images/player_lives.png" />
        <title>Verify through Email</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script
            src="https://kit.fontawesome.com/4bd303fa0b.js"
            crossorigin="anonymous"
        ></script>
        <script type="text/javascript" src="./js/verifyEmail.js"></script>
        <link
            rel="stylesheet"
            type="text/css"
            href="./css/registerLoginMailPass.css"
        />
    </head>
    <body>
        <input
            id="loginBtn"
            type="submit"
            value="Login"
            class="btn"
            style="position: absolute; right: 5%; top: 0px"
        />
        <div class="container verify-email-cont" style="top: 15px">
            <p>No Worries!</p>

            <form action="#" class="verify-email-form">
                <h2 class="form-title">Send Email to reset your password</h2>
                <div class="input-field">
                    <i class="fa-solid fa-envelope"></i>
                    <input
                        type="email"
                        placeholder="Enter your email"
                        id="mailToSend"
                    />
                </div>
                <input
                    type="button"
                    value="Send Email"
                    id="sendEmail"
                    class="btn"
                    style="width: 120px"
                />
            </form>
        </div>
    </body>
</html>
