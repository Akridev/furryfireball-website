<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css" integrity="sha384-zCbKRCUGaJDkqS1kPbPd7TveP5iyJE0EjAuZQTgFLD2ylzuqKfdKlfG/eSrtxUkn" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/leaderboard.css" />
    <link rel="icon" type="image/x-icon" href="images/player_lives.png" />
    <title>Leaderboard</title>
    <link rel="stylesheet" href="./css/playerInfoBar.css" />
    <script src="./js/confetti_api/confetti.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-query@3.39.2/dist/react-query.production.min.js"></script>
    <script src="./react/compiled/components/playerInfoBar.js" type="module"></script>
  </head>
  <body>
    <div class="bar" id="playerInfoBar"></div>
    <div class="body">
    <div class="whole-container m-auto">
        <div class="row">
            <div class="col-4">
                <button onclick="location.href='/home'" id="home" class="blue btn home-button">
                  <img src="images/home.png" alt="home-icon" width="50"/>
                  <span>Home</span>
                </button>
                <div id="button-grp">
                  <a href="#global"><button id="global" class="type-button">
                    <span>Global</span>
                  </button></a><br>
                  <a href="#local"><button id="local" class="type-button">
                    <span>Local</span>
                  </button></a><br>
                  <a href="#friends"><button id="friends" class="type-button">
                    <span>Friends</span>
                  </button></a>
                </div>
            </div>
            <div class="col-8">
                <div class="lb-container">
                  <img class="wreath" src="images/leaderboard/wreath.png" alt="Laurel Wreath" width="400px"/>
                  <!-- <img class="profile" src="images/leaderboard/profile.png" alt="Profile Icon" width="80px"/> -->
                  <img class="trophy" src="images/leaderboard/trophy.png" alt="Trophy" width="70px"/>

                  <svg id="refresh" xmlns="http://www.w3.org/2000/svg" width="35" viewBox="0 0 24 24"><path d="M20.944 12.979c-.489 4.509-4.306 8.021-8.944 8.021-2.698 0-5.112-1.194-6.763-3.075l1.245-1.633c1.283 1.645 3.276 2.708 5.518 2.708 3.526 0 6.444-2.624 6.923-6.021h-2.923l4-5.25 4 5.25h-3.056zm-15.864-1.979c.487-3.387 3.4-6 6.92-6 2.237 0 4.228 1.059 5.51 2.698l1.244-1.632c-1.65-1.876-4.061-3.066-6.754-3.066-4.632 0-8.443 3.501-8.941 8h-3.059l4 5.25 4-5.25h-2.92z"/></svg>
                  
                  <span id="gamemode">Gamemode:</span>
                  <select id="gamemode-select">
                  </select>
                  <!--<div id="your-rank"><a href="#you">Your rank: <span style="color: gold;">#7</span></a></div>-->
                  <div id="type-title" class="type l-green">Global</div>
                  <span id="prompt-content">
                    <div class="prompt">
                      <span id="prompt-text"></span><br>
                      <button onclick="location.href='/registerLogin'" id="prompt-btn">Log In</button>
                    </div>
                  </span>
                  <div id="loading"></div>
                  <span id="lb-content">
                    <div id="attribute">
                      <span class="rank">Rank</span>
                      <span class="name">Player</span>
                      <span class="score">Score</span>
                      <span class="time">Time/s</span>
                    </div>
                    <div id="lb-list">
                    </div>
                  </span>
                </div>
                <div class="lb-title blue">Leaderboard</div>
            </div>
        </div>
    </div>
  </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-fQybjgWLrvvRgtW6bFlB7jaZrFsaBXjsOMm/tB9LTS58ONXgqbR9W8oWht/amnpF" crossorigin="anonymous"></script>
    <script src="./js/leaderboard.js"></script>
  </body>
</html>
